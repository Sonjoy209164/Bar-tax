# Reply templates for the conversation entry layer.
#
# Editing rules:
#   - One block per boundary_type (or "occasion" for any occasion_*).
#   - Three languages required: english, banglish, bangla.
#   - Use {event} and {categories} as the only slots in answers/follow_ups.
#   - Keep strings short, friendly, never claim medical/legal/political stance.
#   - Tests assert exact substrings: "Girlfriend", "perfume", "Sorry",
#     "self-care", "wedding", "Budget", "Medical advice", "neutral",
#     "shopping assistant", "বিয়ে" — preserve these when editing.

