app:
  name: bangla-tax-rag
  environment: development
  host: 0.0.0.0
  port: 4893
paths:
  raw_data_dir: data/raw
  processed_data_dir: data/processed
  agentic_store_dir: data/agentic_store
  inventory_catalog_path: data/inventory/catalog.jsonl
  inventory_business_signal_path: data/inventory/business_signals.jsonl
  inventory_sqlite_path: data/inventory/inventory_mirror.sqlite3
  sparse_index_dir: indexes/sparse
  dense_index_dir: indexes/dense
  results_dir: results
  trace_dir: results/traces
  ui_backend_base_url: http://127.0.0.1:4893
parser:
  provider: fallback
  result_type: markdown
retrieval:
  mode: hybrid
  top_k: 5
  final_evidence_k: 3
generation:
  provider: openai_compatible
  model_name: qwen3:8b
  base_url: http://127.0.0.1:11434/v1
  max_tokens: 512
  temperature: 0.0
  abstention_score_threshold: 0.75
  verification_enabled: true
inventory_chat:
  storage_backend: jsonl
  sqlite_path: data/inventory/inventory_mirror.sqlite3
  natural_answers_enabled: true
  natural_answer_model_name: qwen3:8b
  natural_answer_temperature: 0.2
  natural_answer_max_tokens: 320
  natural_answer_min_confidence: 0.45
  natural_answer_timeout_seconds: 60.0
  conversation_history_limit: 6
embeddings:
  provider: transformers
  model_name: BAAI/bge-m3
  base_url:
  dimensions:
vector_store:
  provider: local
  metric: cosine
  namespace:
  local_store_path: data/agentic_store/local_vectors.jsonl
  pinecone_index_name:
  pinecone_host:
  milvus_uri:
  milvus_collection_name:
reranker:
  provider: transformers
  model_name: BAAI/bge-reranker-v2-m3
  base_url:
