<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inventory Chat</title>
    <link rel="stylesheet" href="./chat.css" />
    <style>
      .image-upload-area {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        border-top: 1px solid var(--line);
        background: var(--panel);
      }
      .image-upload-area label {
        cursor: pointer;
        color: var(--muted);
        font-size: 0.8rem;
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 3px 8px;
        border: 1px solid var(--line);
        border-radius: 4px;
      }
      .image-upload-area label:hover { color: var(--accent); border-color: var(--accent); }
      #imageInput { display: none; }
      #imagePreview {
        max-height: 48px;
        max-width: 64px;
        border-radius: 4px;
        object-fit: cover;
        display: none;
        border: 1px solid var(--line);
      }
      #clearImageBtn {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--muted);
        font-size: 1rem;
        display: none;
        padding: 0 2px;
        line-height: 1;
      }
      #clearImageBtn:hover { color: #dc2626; }
      .order-status-bar {
        padding: 6px 12px;
        background: #fef3c7;
        border-top: 1px solid #fcd34d;
        font-size: 0.8rem;
        color: #92400e;
        display: none;
      }
      .order-status-bar.active { display: block; }
      .order-confirm-bar {
        display: none;
        gap: 8px;
        padding: 6px 12px;
        background: #f0fdf4;
        border-top: 1px solid #86efac;
      }
      .order-confirm-bar.active { display: flex; }
      .order-confirm-bar button {
        padding: 5px 14px;
        border-radius: 5px;
        font-size: 0.82rem;
        cursor: pointer;
        font-weight: 600;
      }
      .btn-confirm { background: var(--accent); color: white; border: 1px solid var(--accent-strong); }
      .btn-confirm:hover { background: var(--accent-strong); }
      .btn-cancel { background: white; color: #dc2626; border: 1px solid #fca5a5; }
      .btn-cancel:hover { background: #fef2f2; }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Fashion Inventory</p>
          <h1>Customer Chat</h1>
        </div>
        <div class="status-pill" id="statusPill">
          <span class="status-dot"></span>
          <span id="statusText">Connecting</span>
        </div>
      </header>

      <section class="chat-panel">
        <div class="messages" id="messages" aria-live="polite"></div>

        <div class="order-status-bar" id="orderStatusBar">
          🛒 Order in progress — please provide your name, phone, delivery area, and payment method.
        </div>
        <div class="order-confirm-bar" id="orderConfirmBar">
          <button class="btn-confirm" id="confirmOrderBtn" type="button">✅ Confirm Order</button>
          <button class="btn-cancel" id="cancelOrderBtn" type="button">✕ Cancel</button>
        </div>

        <div class="chips" id="chips">
          <button type="button">ei same design ta blue color e ache?</button>
          <button type="button">oily skin er jonno sunscreen ache?</button>
          <button type="button">men er brown loafer size 42 ache?</button>
          <button type="button">নেভি কাতান শাড়ির সাথে কোন ব্যাগ মানাবে?</button>
          <button type="button">Dhaka delivery charge koto?</button>
          <button type="button">refund policy ki?</button>
          <button type="button">eid er jonno 5000 er moddhe elegant saree</button>
        </div>

        <div class="image-upload-area" id="imageUploadArea">
          <label for="imageInput">📷 Find by Image</label>
          <input type="file" id="imageInput" accept="image/*" />
          <img id="imagePreview" alt="Selected image" />
          <button type="button" id="clearImageBtn" title="Remove image">✕</button>
          <span id="imageLabel" style="font-size:0.75rem;color:var(--muted);"></span>
        </div>

        <form class="composer" id="chatForm">
          <textarea
            id="chatInput"
            rows="1"
            autocomplete="off"
            placeholder="Type Bangla, Banglish, or English... or upload a product image above"
          ></textarea>
          <button id="sendButton" type="submit">Send</button>
        </form>
      </section>
    </main>
    <script src="./chat.js"></script>
  </body>
</html>
